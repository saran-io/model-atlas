<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Panel labels -->
      <text x="248" y="56" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Multi-Head Attention</text>
      <text x="248" y="72" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GPT-2 · 8 Q · 8 K · 8 V</text>

      <text x="752" y="56" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Grouped-Query Attention</text>
      <text x="752" y="72" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLAMA 3.2 · 8 Q · 2 K · 2 V</text>

      <!-- Center divider -->
      <line x1="500" y1="100" x2="500" y2="448" stroke="rgba(45,49,66,0.10)" stroke-width="0.8" stroke-dasharray="3,3"/>

      <!-- ========== LEFT PANEL: MHA ========== -->
      <!-- Connection lines: each Q connects to its own K and V (drawn first) -->
      <!-- Q row at y=128, K row at y=240, V row at y=352. 8 heads x=64..432 step 48 -->
      <g stroke="#4f5d75" stroke-width="0.8" opacity="0.55">
        <line x1="80" y1="156" x2="80" y2="240"/><line x1="80" y1="268" x2="80" y2="352"/>
        <line x1="128" y1="156" x2="128" y2="240"/><line x1="128" y1="268" x2="128" y2="352"/>
        <line x1="176" y1="156" x2="176" y2="240"/><line x1="176" y1="268" x2="176" y2="352"/>
        <line x1="224" y1="156" x2="224" y2="240"/><line x1="224" y1="268" x2="224" y2="352"/>
        <line x1="272" y1="156" x2="272" y2="240"/><line x1="272" y1="268" x2="272" y2="352"/>
        <line x1="320" y1="156" x2="320" y2="240"/><line x1="320" y1="268" x2="320" y2="352"/>
        <line x1="368" y1="156" x2="368" y2="240"/><line x1="368" y1="268" x2="368" y2="352"/>
        <line x1="416" y1="156" x2="416" y2="240"/><line x1="416" y1="268" x2="416" y2="352"/>
      </g>

      <!-- Row labels -->
      <text x="48" y="144" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">Q</text>
      <text x="48" y="256" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">K</text>
      <text x="48" y="368" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">V</text>

      <!-- Q heads: 8 boxes -->
      <g>
        <rect x="68" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="116" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="164" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="212" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="260" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="308" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="356" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="404" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      </g>

      <!-- K heads: 8 boxes -->
      <g>
        <rect x="68" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="116" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="164" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="212" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="260" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="308" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="356" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="404" y="240" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      </g>

      <!-- V heads: 8 boxes -->
      <g>
        <rect x="68" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="116" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="164" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="212" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="260" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="308" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="356" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
        <rect x="404" y="352" width="24" height="28" rx="4" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      </g>

      <!-- Cache callout MHA -->
      <text x="248" y="416" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">KV cache: 8 K + 8 V = 16 heads</text>
      <text x="248" y="432" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">one K, V per query</text>

      <!-- ========== RIGHT PANEL: GQA ========== -->
      <!-- 8 Q heads x=584..916 step 48; 2 K + 2 V heads centered at x=656 and x=848 -->
      <!-- Each group of 4 Q shares 1 K+V. Group A: Q at 568..712 → K/V at 632; Group B: Q at 760..904 → K/V at 824 -->
      <!-- Q centers: 580, 628, 676, 724 (group A) ; 772, 820, 868, 916 (group B) -->
      <!-- K/V centers: 652 (A), 844 (B) -->
      <g stroke="#eb6c36" stroke-width="1" opacity="0.7">
        <!-- Group A: 4 Qs to 1 K -->
        <line x1="584" y1="156" x2="652" y2="240"/>
        <line x1="632" y1="156" x2="652" y2="240"/>
        <line x1="680" y1="156" x2="652" y2="240"/>
        <line x1="728" y1="156" x2="652" y2="240"/>
        <!-- Group A: 1 K to 1 V (just vertical) -->
        <line x1="652" y1="268" x2="652" y2="352"/>
        <!-- Group B -->
        <line x1="776" y1="156" x2="844" y2="240"/>
        <line x1="824" y1="156" x2="844" y2="240"/>
        <line x1="872" y1="156" x2="844" y2="240"/>
        <line x1="920" y1="156" x2="844" y2="240"/>
        <line x1="844" y1="268" x2="844" y2="352"/>
      </g>

      <!-- Row labels for right panel -->
      <text x="552" y="144" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">Q</text>
      <text x="552" y="256" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">K</text>
      <text x="552" y="368" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="end" letter-spacing="0.08em">V</text>

      <!-- Q heads: 8 boxes -->
      <g>
        <rect x="572" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="620" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="668" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="716" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="764" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="812" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="860" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
        <rect x="908" y="128" width="24" height="28" rx="4" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      </g>

      <!-- Group brackets above Q -->
      <line x1="568" y1="116" x2="744" y2="116" stroke="#eb6c36" stroke-width="1"/>
      <line x1="568" y1="116" x2="568" y2="124" stroke="#eb6c36" stroke-width="1"/>
      <line x1="744" y1="116" x2="744" y2="124" stroke="#eb6c36" stroke-width="1"/>
      <line x1="760" y1="116" x2="936" y2="116" stroke="#eb6c36" stroke-width="1"/>
      <line x1="760" y1="116" x2="760" y2="124" stroke="#eb6c36" stroke-width="1"/>
      <line x1="936" y1="116" x2="936" y2="124" stroke="#eb6c36" stroke-width="1"/>
      <text x="656" y="108" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GROUP A</text>
      <text x="848" y="108" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">GROUP B</text>

      <!-- K heads: 2 boxes (focal) -->
      <rect x="640" y="240" width="24" height="28" rx="4" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="832" y="240" width="24" height="28" rx="4" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>

      <!-- V heads: 2 boxes (focal) -->
      <rect x="640" y="352" width="24" height="28" rx="4" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="832" y="352" width="24" height="28" rx="4" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>

      <!-- Cache callout GQA -->
      <text x="752" y="416" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">KV cache: 2 K + 2 V = 4 heads</text>
      <text x="752" y="432" fill="#eb6c36" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">4× SMALLER</text>

      <!-- Bottom takeaway -->
      <text x="500" y="488" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">The query budget is the same. The cache shrinks because fewer K/V heads serve more Q heads.</text>

      <!-- Legend strip -->
      <line x1="40" y1="528" x2="960" y2="528" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="544" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="120" y="538" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="140" y="546" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Query head</text>

      <rect x="240" y="538" width="14" height="10" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="260" y="546" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Cached K / V (MHA)</text>

      <rect x="420" y="538" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="440" y="546" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Shared K / V (GQA)</text>
    </svg>