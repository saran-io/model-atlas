<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiGLU — gated feed-forward block</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-accent: #eb6c36;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1100px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · SwiGLU FFN</p>
    <h1>SwiGLU — one branch decides, the other carries</h1>

    <svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Lane labels -->
      <text x="280" y="148" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">GATE BRANCH</text>
      <text x="720" y="148" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">CANDIDATE BRANCH</text>

      <!-- Arrows (drawn first) -->
      <!-- Input → split -->
      <line x1="500" y1="116" x2="500" y2="156" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Split point → gate_proj -->
      <line x1="500" y1="172" x2="280" y2="172" stroke="#4f5d75" stroke-width="1"/>
      <line x1="280" y1="172" x2="280" y2="200" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- Split point → up_proj -->
      <line x1="500" y1="172" x2="720" y2="172" stroke="#4f5d75" stroke-width="1"/>
      <line x1="720" y1="172" x2="720" y2="200" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- gate_proj → SiLU -->
      <line x1="280" y1="264" x2="280" y2="312" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <!-- SiLU → multiply -->
      <line x1="280" y1="376" x2="280" y2="412" stroke="#eb6c36" stroke-width="1.4"/>
      <line x1="280" y1="412" x2="468" y2="412" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- up_proj → multiply -->
      <line x1="720" y1="264" x2="720" y2="412" stroke="#eb6c36" stroke-width="1.4"/>
      <line x1="720" y1="412" x2="532" y2="412" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- multiply → down_proj -->
      <line x1="500" y1="436" x2="500" y2="488" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- down_proj → output -->
      <line x1="500" y1="552" x2="500" y2="600" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- Arrow labels -->
      <rect x="180" y="280" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="208" y="290" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">SIGNAL</text>

      <rect x="764" y="320" width="56" height="12" rx="2" fill="#f5f5f5"/>
      <text x="792" y="330" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FEATURES</text>

      <!-- Node: Input x -->
      <rect x="408" y="64" width="184" height="52" rx="6" fill="#f5f5f5"/>
      <rect x="408" y="64" width="184" height="52" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="416" y="72" width="32" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="432" y="81" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">IN</text>
      <text x="500" y="100" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Input x</text>

      <!-- Split node -->
      <circle cx="500" cy="172" r="6" fill="#2d3142"/>

      <!-- Node: gate_proj -->
      <rect x="180" y="200" width="200" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="180" y="200" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="188" y="208" width="48" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="212" y="217" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LINEAR</text>
      <text x="280" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">gate_proj(x)</text>
      <text x="280" y="252" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">d → d_ff</text>

      <!-- Node: SiLU -->
      <rect x="180" y="312" width="200" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="180" y="312" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="188" y="320" width="36" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="206" y="329" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ACT</text>
      <text x="280" y="348" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">SiLU</text>
      <text x="280" y="364" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">x · σ(x)</text>

      <!-- Node: up_proj -->
      <rect x="620" y="200" width="200" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="620" y="200" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="628" y="208" width="48" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="652" y="217" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LINEAR</text>
      <text x="720" y="236" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">up_proj(x)</text>
      <text x="720" y="252" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">d → d_ff</text>

      <!-- Node: Element-wise multiply [FOCAL] -->
      <rect x="468" y="388" width="64" height="48" rx="6" fill="#f5f5f5"/>
      <rect x="468" y="388" width="64" height="48" rx="6" fill="rgba(235,108,54,0.10)" stroke="#eb6c36" stroke-width="1.2"/>
      <text x="500" y="420" fill="#eb6c36" font-size="22" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">⊙</text>

      <!-- Multiply label -->
      <text x="500" y="464" fill="#eb6c36" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">gate ⊙ candidate</text>

      <!-- Node: down_proj -->
      <rect x="400" y="488" width="200" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="400" y="488" width="200" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="408" y="496" width="48" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="432" y="505" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LINEAR</text>
      <text x="500" y="524" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">down_proj</text>
      <text x="500" y="540" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">d_ff → d</text>

      <!-- Node: Output -->
      <rect x="408" y="600" width="184" height="52" rx="6" fill="#f5f5f5"/>
      <rect x="408" y="600" width="184" height="52" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="416" y="608" width="40" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="436" y="617" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OUT</text>
      <text x="500" y="636" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">y → residual add</text>

      <!-- Legend strip -->
      <line x1="40" y1="676" x2="960" y2="676" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="692" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="120" y="686" width="14" height="10" rx="2" fill="rgba(235,108,54,0.10)" stroke="#eb6c36" stroke-width="1.2"/>
      <text x="140" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Gate point — what makes it "gated"</text>

      <line x1="400" y1="692" x2="428" y2="692" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="436" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Gate-controlled flow</text>

      <line x1="600" y1="692" x2="628" y2="692" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <text x="636" y="694" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Standard linear path</text>
    </svg>
  </div>
</body>
</html>
