<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llama 3.2 — end-to-end inference pipeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-accent: #eb6c36;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1300px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 1000px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · End-to-end</p>
    <h1>Llama 3.2 — tokens in, next-token logits out</h1>

    <svg viewBox="0 0 1280 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Arrows (drawn first) -->
      <line x1="180" y1="184" x2="232" y2="184" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="412" y1="184" x2="464" y2="184" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <line x1="704" y1="184" x2="756" y2="184" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="916" y1="184" x2="968" y2="184" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="1148" y1="184" x2="1200" y2="184" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- Tied-weights link: token embeddings → LM head (loop above) -->
      <path d="M 320 132 Q 320 80 1040 80 Q 1040 132 1040 132" fill="none" stroke="rgba(45,49,66,0.30)" stroke-width="0.8" stroke-dasharray="4,3"/>
      <rect x="624" y="68" width="100" height="14" fill="#f5f5f5"/>
      <text x="674" y="79" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">TIED WEIGHTS</text>

      <!-- Arrow labels -->
      <rect x="184" y="172" width="44" height="12" rx="2" fill="#f5f5f5"/>
      <text x="206" y="182" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">IDS</text>

      <rect x="416" y="172" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="440" y="182" fill="#eb6c36" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">B,T,d</text>

      <rect x="708" y="172" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="732" y="182" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">B,T,d</text>

      <rect x="920" y="172" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="944" y="182" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">B,T,d</text>

      <rect x="1152" y="172" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="1176" y="182" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LOGITS</text>

      <!-- Node 1: Tokens (input) -->
      <rect x="40" y="148" width="140" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="40" y="148" width="140" height="72" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="48" y="156" width="32" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="64" y="165" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">IN</text>
      <text x="110" y="186" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Tokens</text>
      <text x="110" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">prompt → ids</text>

      <!-- Node 2: Token Embeddings -->
      <rect x="232" y="148" width="180" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="232" y="148" width="180" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="240" y="156" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="260" y="165" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EMB</text>
      <text x="322" y="186" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Token embeddings</text>
      <text x="322" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">vocab × d</text>

      <!-- Node 3: × N Decoder Blocks [FOCAL] -->
      <rect x="464" y="132" width="240" height="104" rx="6" fill="#f5f5f5"/>
      <rect x="464" y="132" width="240" height="104" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1.2"/>
      <rect x="472" y="140" width="56" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="500" y="149" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">×N BLOCKS</text>
      <text x="696" y="232" fill="rgba(235,108,54,0.10)" font-size="32" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">01</text>
      <text x="584" y="180" fill="#2d3142" font-size="13" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Decoder blocks</text>
      <text x="584" y="198" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">RMSNorm · GQA + RoPE</text>
      <text x="584" y="212" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">RMSNorm · SwiGLU</text>

      <!-- Node 4: Final RMSNorm -->
      <rect x="756" y="148" width="160" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="756" y="148" width="160" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="764" y="156" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="784" y="165" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NORM</text>
      <text x="836" y="186" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Final RMSNorm</text>
      <text x="836" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">stabilize logits</text>

      <!-- Node 5: Tied LM Head -->
      <rect x="968" y="148" width="180" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="968" y="148" width="180" height="72" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="976" y="156" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="996" y="165" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">HEAD</text>
      <text x="1058" y="186" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Tied LM head</text>
      <text x="1058" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">d → vocab</text>

      <!-- Node 6: Logits → Sample -->
      <rect x="1200" y="148" width="80" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="1200" y="148" width="80" height="72" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <rect x="1208" y="156" width="40" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.50)" stroke-width="0.8"/>
      <text x="1228" y="165" fill="#4f5d75" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">OUT</text>
      <text x="1240" y="186" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Sample</text>
      <text x="1240" y="204" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">next id</text>

      <!-- Bottom annotation -->
      <text x="640" y="276" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">All four modern upgrades — RMSNorm, RoPE, GQA, SwiGLU — live inside the decoder block.</text>
      <text x="640" y="294" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">Everything outside it is the same shape as GPT-2.</text>

      <!-- Legend strip -->
      <line x1="40" y1="328" x2="1240" y2="328" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="344" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="120" y="338" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1.2"/>
      <text x="140" y="346" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Where the modern recipe lives</text>

      <rect x="320" y="338" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="340" y="346" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Standard transformer op</text>

      <line x1="540" y1="344" x2="568" y2="344" stroke="rgba(45,49,66,0.30)" stroke-width="0.8" stroke-dasharray="4,3"/>
      <text x="576" y="346" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Tied weights (embeddings ↔ LM head)</text>
    </svg>
  </div>
</body>
</html>
