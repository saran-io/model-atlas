<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llama 3.2 · Decoder block</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-accent: #eb6c36;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1100px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Llama 3.2</p>
    <h1>One Llama-style decoder block — the modern transformer recipe</h1>

    <svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Decoder-block dashed boundary -->
      <rect x="120" y="156" width="640" height="552" rx="8" fill="none" stroke="rgba(45,49,66,0.20)" stroke-width="1" stroke-dasharray="5,4"/>
      <rect x="148" y="148" width="160" height="16" fill="#f5f5f5"/>
      <text x="156" y="160" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.18em">DECODER BLOCK · ×N</text>

      <!-- Residual paths (drawn first, behind boxes) -->
      <!-- Skip 1: from input split → +Add 1 (right side) -->
      <path d="M 500 132 L 700 132 L 700 432 L 532 432" fill="none" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <!-- Skip 2: from +Add 1 split → +Add 2 (right side) -->
      <path d="M 500 448 L 700 448 L 700 692 L 532 692" fill="none" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

      <!-- Main vertical flow arrows -->
      <line x1="500" y1="132" x2="500" y2="184" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="500" y1="244" x2="500" y2="296" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="500" y1="368" x2="500" y2="416" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <line x1="500" y1="448" x2="500" y2="500" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="500" y1="560" x2="500" y2="612" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="500" y1="684" x2="500" y2="676" stroke="#eb6c36" stroke-width="1.4"/>
      <line x1="500" y1="708" x2="500" y2="760" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- Residual labels -->
      <rect x="676" y="276" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="700" y="286" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RESIDUAL</text>
      <rect x="676" y="556" width="48" height="12" rx="2" fill="#f5f5f5"/>
      <text x="700" y="566" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RESIDUAL</text>

      <!-- Node: Input hidden state -->
      <rect x="380" y="72" width="240" height="60" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="72" width="240" height="60" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
      <rect x="388" y="80" width="32" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.40)" stroke-width="0.8"/>
      <text x="404" y="89" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">IN</text>
      <text x="500" y="108" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Input hidden state</text>
      <text x="500" y="124" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">h ∈ ℝ^(B × T × d)</text>

      <!-- Node: RMSNorm 1 -->
      <rect x="400" y="184" width="200" height="60" rx="6" fill="#f5f5f5"/>
      <rect x="400" y="184" width="200" height="60" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="408" y="192" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="428" y="201" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NORM</text>
      <text x="500" y="220" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">RMSNorm</text>
      <text x="500" y="236" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">x / √(mean(x²) + ε)</text>

      <!-- Node: GQA + RoPE [FOCAL] -->
      <rect x="380" y="296" width="240" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="296" width="240" height="72" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="388" y="304" width="40" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="408" y="313" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ATTN</text>
      <text x="612" y="364" fill="rgba(235,108,54,0.10)" font-size="32" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">01</text>
      <text x="500" y="332" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Grouped-Query Attention + RoPE</text>
      <text x="500" y="348" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">32 Q heads · 8 K/V heads · rotated Q,K</text>

      <!-- Node: + Add 1 (residual sum) -->
      <circle cx="500" cy="432" r="20" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="437" fill="#2d3142" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">+</text>

      <!-- Node: RMSNorm 2 -->
      <rect x="400" y="500" width="200" height="60" rx="6" fill="#f5f5f5"/>
      <rect x="400" y="500" width="200" height="60" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <rect x="408" y="508" width="40" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.40)" stroke-width="0.8"/>
      <text x="428" y="517" fill="#2d3142" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NORM</text>
      <text x="500" y="536" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">RMSNorm</text>
      <text x="500" y="552" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">x / √(mean(x²) + ε)</text>

      <!-- Node: SwiGLU FFN [FOCAL] -->
      <rect x="380" y="612" width="240" height="72" rx="6" fill="#f5f5f5"/>
      <rect x="380" y="612" width="240" height="72" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <rect x="388" y="620" width="40" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.50)" stroke-width="0.8"/>
      <text x="408" y="629" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">FFN</text>
      <text x="612" y="680" fill="rgba(235,108,54,0.10)" font-size="32" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="end">02</text>
      <text x="500" y="648" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">SwiGLU feed-forward</text>
      <text x="500" y="664" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">SiLU(gate(x)) ⊙ up(x) → down</text>

      <!-- Node: + Add 2 -->
      <circle cx="500" cy="692" r="20" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="697" fill="#2d3142" font-size="16" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">+</text>

      <!-- Output label -->
      <text x="500" y="780" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">→ TO NEXT BLOCK</text>

      <!-- Legend strip -->
      <line x1="40" y1="784" x2="960" y2="784" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="800" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="120" y="794" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="140" y="802" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Modern upgrade</text>

      <rect x="280" y="794" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="300" y="802" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Standard op</text>

      <line x1="420" y1="800" x2="448" y2="800" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
      <text x="456" y="802" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Residual skip</text>

      <line x1="568" y1="800" x2="596" y2="800" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <text x="604" y="802" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Primary path</text>
    </svg>
  </div>
</body>
</html>
