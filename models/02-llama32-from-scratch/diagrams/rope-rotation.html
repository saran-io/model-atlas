<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoPE — rotating Q, K by position</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-accent: #eb6c36;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1100px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Concept · Position encoding</p>
    <h1>RoPE puts position into the dot product, not into the embedding</h1>

    <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
        <marker id="arrow-q" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#2d3142"/></marker>
        <marker id="arrow-q-accent" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0, 10 4, 0 8" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- ========== LEFT PLANE: position 0 ========== -->
      <text x="240" y="56" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Token at position 0</text>
      <text x="240" y="72" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NO ROTATION · θ = 0</text>

      <!-- Plane background -->
      <circle cx="240" cy="280" r="160" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.20)" stroke-width="1"/>
      <!-- Axes -->
      <line x1="60" y1="280" x2="420" y2="280" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <line x1="240" y1="100" x2="240" y2="460" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="424" y="284" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">x</text>
      <text x="244" y="100" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">y</text>

      <!-- Original Q vector (45° up-right) -->
      <line x1="240" y1="280" x2="356" y2="164" stroke="#2d3142" stroke-width="1.6" marker-end="url(#arrow-q)"/>
      <text x="364" y="156" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif">q</text>

      <!-- Original K vector (60° up-right, slightly different angle) -->
      <line x1="240" y1="280" x2="320" y2="120" stroke="#4f5d75" stroke-width="1.4" marker-end="url(#arrow-q)" stroke-dasharray="4,3"/>
      <text x="328" y="116" fill="#4f5d75" font-size="12" font-weight="600" font-family="'Geist', sans-serif">k</text>

      <!-- Angle between q and k -->
      <path d="M 264 256 A 30 30 0 0 0 256 248" fill="none" stroke="#7a8399" stroke-width="0.8"/>
      <text x="276" y="248" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">α</text>

      <!-- ========== RIGHT PLANE: position 5 (rotated) ========== -->
      <text x="760" y="56" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Same token at position 5</text>
      <text x="760" y="72" fill="#eb6c36" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ROTATED BY 5θ</text>

      <!-- Plane background -->
      <circle cx="760" cy="280" r="160" fill="rgba(235,108,54,0.04)" stroke="rgba(235,108,54,0.40)" stroke-width="1"/>
      <!-- Axes -->
      <line x1="580" y1="280" x2="940" y2="280" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <line x1="760" y1="100" x2="760" y2="460" stroke="rgba(45,49,66,0.30)" stroke-width="0.8"/>
      <text x="944" y="284" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">x</text>
      <text x="764" y="100" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">y</text>

      <!-- Rotated Q vector (rotated counter-clockwise from original 45° by ~70° → ~115°) -->
      <line x1="760" y1="280" x2="690" y2="160" stroke="#eb6c36" stroke-width="1.6" marker-end="url(#arrow-q-accent)"/>
      <text x="676" y="152" fill="#eb6c36" font-size="12" font-weight="600" font-family="'Geist', sans-serif">q'</text>

      <!-- Rotated K vector (rotated by same angle) -->
      <line x1="760" y1="280" x2="660" y2="208" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-q-accent)" stroke-dasharray="4,3"/>
      <text x="648" y="204" fill="#eb6c36" font-size="12" font-weight="600" font-family="'Geist', sans-serif">k'</text>

      <!-- Original (faded) for reference -->
      <line x1="760" y1="280" x2="876" y2="164" stroke="rgba(45,49,66,0.18)" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="760" y1="280" x2="840" y2="120" stroke="rgba(45,49,66,0.18)" stroke-width="1" stroke-dasharray="3,3"/>

      <!-- Rotation arc -->
      <path d="M 856 220 A 110 110 0 0 0 720 184" fill="none" stroke="#eb6c36" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="800" y="170" fill="#eb6c36" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">+ 5θ</text>

      <!-- Angle preserved between q' and k' -->
      <path d="M 740 264 A 30 30 0 0 0 728 256" fill="none" stroke="#7a8399" stroke-width="0.8"/>
      <text x="722" y="252" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace">α</text>

      <!-- Equation in middle -->
      <rect x="380" y="490" width="240" height="40" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="500" y="516" fill="#2d3142" font-size="13" font-family="'Geist Mono', monospace" text-anchor="middle">q' · k' = f( α, Δpos )</text>

      <!-- Bottom takeaway -->
      <text x="500" y="560" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">Same content, different position. The angle between q and k stays — but the dot product now</text>
      <text x="500" y="578" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">depends on how far apart the two tokens sit. That is "relative position" baked into attention.</text>
    </svg>
  </div>
</body>
</html>
