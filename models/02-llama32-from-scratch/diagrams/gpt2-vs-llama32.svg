<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#f5f5f5"/>

      <!-- Column headers -->
      <text x="280" y="48" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GPT-2</text>
      <text x="280" y="64" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">2019 · LEARNED RECIPE</text>

      <text x="720" y="48" fill="#2d3142" font-size="14" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Llama 3.2</text>
      <text x="720" y="64" fill="#7a8399" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">2024 · MODERN STACK</text>

      <!-- Row eyebrows + connector arrows + cells -->
      <!-- Row 1: Position -->
      <text x="500" y="116" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">POSITION</text>
      <line x1="424" y1="136" x2="576" y2="136" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="160" y="104" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="160" y="104" width="240" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="280" y="140" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Learned positional embeddings</text>
      <text x="280" y="156" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">add pos vector to token</text>

      <rect x="600" y="104" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="600" y="104" width="240" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="720" y="140" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">RoPE</text>
      <text x="720" y="156" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">rotate Q, K by position</text>

      <!-- Row 2: Attention -->
      <text x="500" y="216" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">ATTENTION</text>
      <line x1="424" y1="236" x2="576" y2="236" stroke="#eb6c36" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <rect x="160" y="204" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="160" y="204" width="240" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="280" y="240" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Multi-Head Attention</text>
      <text x="280" y="256" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">32 Q · 32 K · 32 V heads</text>

      <rect x="600" y="204" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="600" y="204" width="240" height="64" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="720" y="240" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Grouped-Query Attention</text>
      <text x="720" y="256" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">32 Q · 8 K · 8 V heads</text>

      <!-- Row 3: Norm -->
      <text x="500" y="316" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">NORM</text>
      <line x1="424" y1="336" x2="576" y2="336" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="160" y="304" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="160" y="304" width="240" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="280" y="340" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">LayerNorm</text>
      <text x="280" y="356" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">subtract mean + divide std</text>

      <rect x="600" y="304" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="600" y="304" width="240" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="720" y="340" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">RMSNorm</text>
      <text x="720" y="356" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">divide by RMS magnitude</text>

      <!-- Row 4: FFN -->
      <text x="500" y="416" fill="#7a8399" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">FFN</text>
      <line x1="424" y1="436" x2="576" y2="436" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <rect x="160" y="404" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="160" y="404" width="240" height="64" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="280" y="440" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">GELU MLP</text>
      <text x="280" y="456" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Linear → GELU → Linear</text>

      <rect x="600" y="404" width="240" height="64" rx="6" fill="#f5f5f5"/>
      <rect x="600" y="404" width="240" height="64" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="720" y="440" fill="#2d3142" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">SwiGLU MLP</text>
      <text x="720" y="456" fill="#4f5d75" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">SiLU(gate) ⊙ up → down</text>

      <!-- Annotation: focal coral applies to load-bearing upgrades -->
      <text x="500" y="528" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">Same skeleton — decoder-only transformer.</text>
      <text x="500" y="546" fill="#4f5d75" font-size="11" font-family="'Geist', sans-serif" font-style="italic" text-anchor="middle">Coral edges mark the upgrades that unlock long context and cheap serving.</text>

      <!-- Legend strip -->
      <line x1="40" y1="572" x2="960" y2="572" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="588" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="120" y="582" width="14" height="10" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
      <text x="140" y="590" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Load-bearing upgrade</text>

      <rect x="300" y="582" width="14" height="10" rx="2" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
      <text x="320" y="590" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Modern default</text>

      <rect x="460" y="582" width="14" height="10" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
      <text x="480" y="590" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">GPT-2 baseline</text>
    </svg>